<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kano Coin (KNC)</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <img src="logo.png" class="logo" alt="Kano Coin Logo">
        <h1>Kano Coin (KNC)</h1>
        <p>Powering Kano, Connecting the World</p>
    </header>


    <section class="profile">
        <h2>👤 Welcome Miner</h2>
        <p>Balance</p>
        <h1 id="balance">0 KNC</h1>
    </section>


    <section class="mining">

        <button id="mineBtn">
            ⛏️ START MINING
        </button>

        <p id="status">
            Tap the button to start mining.
        </p>

    </section>


    <section class="rewards">

        <button id="dailyReward">
            🎁 Daily Reward
        </button>

        <button id="referral">
            👥 Invite Friends
        </button>

        <button id="leaderboard">
            🏆 Leaderboard
        </button>

        <button id="wallet">
            💰 Wallet
        </button>

    </section>


    <footer>
        <p>Official Kano Coin (KNC)</p>
    </footer>

</div>


<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Kano Coin App Script -->
<script src="script.js"></script>


</body>
</html>
